<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1100"
  height="650"
  viewBox="0 0 1100 650"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Animated terminal introduction for Esmaeil Abdan</title>
  <desc id="description">
    Animated terminal introducing Esmaeil Abdan, a computer science and
    mathematics student at Swarthmore College.
  </desc>

  <defs>
    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco,
          Consolas, "Liberation Mono", monospace;
      }

      .output {
        opacity: 0;
        animation: appear 0.25s forwards;
      }

      .output-1 { animation-delay: 1.6s; }
      .output-2 { animation-delay: 1.9s; }
      .output-3 { animation-delay: 3.5s; }
      .output-4 { animation-delay: 5.4s; }
      .output-5 { animation-delay: 5.8s; }
      .output-6 { animation-delay: 6.2s; }
      .output-7 { animation-delay: 6.6s; }
      .output-8 { animation-delay: 8.3s; }
      .output-9 { animation-delay: 8.6s; }

      .cursor {
        animation: blink 0.8s step-end infinite;
      }

      @keyframes appear {
        to {
          opacity: 1;
        }
      }

      @keyframes blink {
        0%, 45% {
          opacity: 1;
        }

        46%, 100% {
          opacity: 0;
        }
      }
    </style>

    <!-- Typing masks -->
    <clipPath id="type-command-1">
      <rect x="42" y="85" width="0" height="38">
        <animate
          attributeName="width"
          from="0"
          to="180"
          dur="1.1s"
          begin="0.3s"
          fill="freeze"
        />
      </rect>
    </clipPath>

    <clipPath id="type-command-2">
      <rect x="42" y="210" width="0" height="38">
        <animate
          attributeName="width"
          from="0"
          to="290"
          dur="1.2s"
          begin="2.1s"
          fill="freeze"
        />
      </rect>
    </clipPath>

    <clipPath id="type-command-3">
      <rect x="42" y="303" width="0" height="38">
        <animate
          attributeName="width"
          from="0"
          to="350"
          dur="1.4s"
          begin="3.8s"
          fill="freeze"
        />
      </rect>
    </clipPath>

    <clipPath id="type-command-4">
      <rect x="42" y="518" width="0" height="38">
        <animate
          attributeName="width"
          from="0"
          to="280"
          dur="1.2s"
          begin="6.9s"
          fill="freeze"
        />
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect
    x="1"
    y="1"
    width="1098"
    height="648"
    rx="18"
    fill="#0D1117"
    stroke="#30363D"
    stroke-width="2"
  />

  <!-- Header -->
  <path
    d="M1 19C1 9.06 9.06 1 19 1H1081C1090.94 1 1099 9.06 1099 19V66H1V19Z"
    fill="#161B22"
  />

  <line
    x1="1"
    y1="66"
    x2="1099"
    y2="66"
    stroke="#30363D"
    stroke-width="2"
  />

  <!-- Window controls -->
  <circle cx="32" cy="33" r="9" fill="#FF5F57"/>
  <circle cx="61" cy="33" r="9" fill="#FEBC2E"/>
  <circle cx="90" cy="33" r="9" fill="#28C840"/>

  <text
    x="550"
    y="41"
    text-anchor="middle"
    fill="#8B949E"
    font-size="19"
    class="mono"
  >
    esmaeil@swarthmore: ~
  </text>

  <!-- Command 1 -->
  <g clip-path="url(#type-command-1)">
    <text x="42" y="112" font-size="22" class="mono">
      <tspan fill="#3FB950">$</tspan>
      <tspan fill="#F0F6FC"> whoami</tspan>
    </text>
  </g>

  <!-- Whoami output -->
  <text
    x="42"
    y="151"
    fill="#F0F6FC"
    font-size="23"
    font-weight="600"
    class="mono output output-1"
  >
    Esmaeil Abdan
  </text>

  <text
    x="42"
    y="184"
    fill="#8B949E"
    font-size="19"
    class="mono output output-2"
  >
    Computer Science + Mathematics @ Swarthmore College
  </text>

  <!-- Command 2 -->
  <g clip-path="url(#type-command-2)">
    <text x="42" y="237" font-size="22" class="mono">
      <tspan fill="#3FB950">$</tspan>
      <tspan fill="#F0F6FC"> cat interests.txt</tspan>
    </text>
  </g>

  <text
    x="42"
    y="276"
    fill="#79C0FF"
    font-size="19"
    class="mono output output-3"
  >
    machine learning · graph analysis · algorithms · full-stack engineering
  </text>

  <!-- Command 3 -->
  <g clip-path="url(#type-command-3)">
    <text x="42" y="330" font-size="22" class="mono">
      <tspan fill="#3FB950">$</tspan>
      <tspan fill="#F0F6FC"> ps aux | grep current</tspan>
    </text>
  </g>

  <!-- Research -->
  <g class="output output-4">
    <text x="42" y="374" fill="#58A6FF" font-size="19" class="mono">
      research
    </text>

    <text x="190" y="374" fill="#3FB950" font-size="19" class="mono">
      running
    </text>

    <text x="330" y="374" fill="#C9D1D9" font-size="19" class="mono">
      machine learning on graph-structured data
    </text>
  </g>

  <!-- Teaching -->
  <g class="output output-5">
    <text x="42" y="411" fill="#58A6FF" font-size="19" class="mono">
      teaching
    </text>

    <text x="190" y="411" fill="#3FB950" font-size="19" class="mono">
      running
    </text>

    <text x="330" y="411" fill="#C9D1D9" font-size="19" class="mono">
      C++ · data structures · algorithms
    </text>
  </g>

  <!-- TradeLab -->
  <g class="output output-6">
    <text x="42" y="448" fill="#58A6FF" font-size="19" class="mono">
      tradelab
    </text>

    <text x="190" y="448" fill="#3FB950" font-size="19" class="mono">
      building
    </text>

    <text x="330" y="448" fill="#C9D1D9" font-size="19" class="mono">
      stock simulation + personalized risk feedback
    </text>
  </g>

  <!-- AirPool -->
  <g class="output output-7">
    <text x="42" y="485" fill="#58A6FF" font-size="19" class="mono">
      airpool
    </text>

    <text x="190" y="485" fill="#3FB950" font-size="19" class="mono">
      contributing
    </text>

    <text x="330" y="485" fill="#C9D1D9" font-size="19" class="mono">
      campus carpool coordination platform
    </text>
  </g>

  <!-- Command 4 -->
  <g clip-path="url(#type-command-4)">
    <text x="42" y="545" font-size="22" class="mono">
      <tspan fill="#3FB950">$</tspan>
      <tspan fill="#F0F6FC"> echo $MINDSET</tspan>
    </text>
  </g>

  <!-- Motto -->
  <text
    x="42"
    y="589"
    fill="#D2A8FF"
    font-size="20"
    font-weight="600"
    class="mono output output-8"
  >
    If I care enough to learn something,
  </text>

  <text
    x="42"
    y="621"
    fill="#D2A8FF"
    font-size="20"
    font-weight="600"
    class="mono output output-9"
  >
    I'll find a way to figure it out.
  </text>

  <!-- Blinking cursor -->
  <rect
    x="487"
    y="602"
    width="12"
    height="23"
    rx="1"
    fill="#3FB950"
    class="cursor"
  >
    <animate
      attributeName="visibility"
      values="hidden;hidden;visible"
      keyTimes="0;0.97;1"
      dur="8.7s"
      fill="freeze"
    />
  </rect>
</svg>
